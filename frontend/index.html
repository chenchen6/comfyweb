<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComfyUI 控制台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 't2i')">t2i</button>
            <button class="tab-btn" onclick="switchTab(event, 'i2i')">i2i</button>
        </div>

        <h1>AI 繪圖實驗室</h1>
        
        <div class="workflow-selector">
            <label for="workflowSelect">選擇工作流：</label>
            <select id="workflowSelect">
                <option value="">載入中...</option>
            </select>
        </div>

        <div id="t2i-tab-content" class="tab-content active">
            <div class="input-group">
                <input type="text" id="promptInputT2i" placeholder="描述想畫的畫面 (例如: 一枝鉛筆)">
                <button onclick="sendPromptT2i()">開始生成</button>
            </div>
            <div id="statusT2i" class="status-box">準備就緒</div>
            <img id="resultImageT2i" class="result-img" src="" alt="生成的圖片">
        </div>

        <div id="i2i-tab-content" class="tab-content">
            <div class="input-group">
                <input type="file" id="imageInputI2i" accept="image/*" onchange="previewImage(this)">
                <input type="text" id="promptInputI2i" placeholder="描述你想如何修改這張圖...">
                <button onclick="sendPromptI2i()">開始處理</button>
            </div>
            <div id="statusI2i" class="status-box">準備就緒</div>
            <img id="resultImageI2i" class="result-img" src="" alt="處理後的圖片">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
